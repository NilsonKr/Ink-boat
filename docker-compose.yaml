services:
  db:
    image: postgres:18.4-alpine3.23
    container_name: ink-boat_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ':5432'
    volumes:
      - ink-boat_postgres:/var/lib/postgresql/
    networks:
      - ink-boat_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      target: dev
    image: ink-boat_frontend_dev
    container_name: ink-boat_frontend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - '3000:3000'
    volumes:
      - .:/app/
      - /app/node_modules
      - /app/.next
      - /app/.pnpm-store
    networks:
      - ink-boat_network
    depends_on:
      db:
        condition: service_healthy

networks:
  ink-boat_network:
    name: ink-boat_network

volumes:
  ink-boat_postgres:
    name: ink-boat_postgres
    external: true
